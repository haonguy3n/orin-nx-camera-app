# DHCP for the USB gadget network (read via conf-dir /etc/dnsmasq.d, which the
# stock dnsmasq.service passes with -7). Hands the USB host exactly
# 192.168.55.100; the device side (192.168.55.1) is set by usb-gadget.sh.

# DHCP only — don't run a DNS server on the camera.
port=0

interface=usb0
# usb0 appears only once the gadget binds; bind-dynamic copes with that.
bind-dynamic

dhcp-range=usb0,192.168.55.100,192.168.55.100,255.255.255.0,1h

# Don't push a default gateway or DNS servers at the host — the camera link
# is point-to-point, the host keeps its normal uplink.
dhcp-option=usb0,3
dhcp-option=usb0,6
