# Vision Components MIPI CSI-2 camera driver (vc_mipi_camera / vc_mipi_core /
# vc_mipi_modules, added to nvidia/drivers/media/i2c by the VC patch set).
#
# Must be =y, not =m: the driver is split across three objects
# (vc_mipi_camera.o, vc_mipi_core.o, vc_mipi_modules.o) wired as
# obj-$(CONFIG_NV_VIDEO_VC_MIPI) += ... and vc_mipi_modules.c exports no
# symbols, so a modular build would produce three .ko that cannot link
# against each other.  VC's own reference defconfig for L4T 35.6.0 also
# sets it to y.
#
# Dependencies (I2C, VIDEO_V4L2, VIDEO_V4L2_SUBDEV_API) are already enabled
# in tegra_defconfig used by this recipe.
CONFIG_NV_VIDEO_VC_MIPI=y

# Integrated Secure USB uses a configfs FunctionFS vendor-bulk function
# (camera-streamer creates functions/ffs.secure and mounts /dev/ffs-secure).
# tegra_defconfig already enables this; pinned here so an L4T bump that drops
# it fails loudly in this fragment rather than silently at runtime.
CONFIG_USB_CONFIGFS_F_FS=y

# The legacy standalone g_ffs gadget must stay OFF.  Built in, its gfs_init()
# claims the FunctionFS instance as a "single" dev, after which
# _ffs_alloc_dev() rejects every configfs ffs.* creation with -EBUSY:
#
#   mkdir /sys/kernel/config/usb_gadget/vc-camera/functions/ffs.secure
#   mkdir: ...: Device or resource busy
#
# This is not hypothetical: enabling CONFIG_USB_FUNCTIONFS here (mistaking it
# for the configfs function) is what broke secure USB.  _GENERIC is a
# sub-option of it.
# CONFIG_USB_FUNCTIONFS is not set
# CONFIG_USB_FUNCTIONFS_GENERIC is not set
