# camera-streamer test configuration — no camera hardware required.
#
# Uses videotestsrc with software H.264 encoding, so it runs on any machine
# with stock GStreamer plugins (base/good/ugly). Useful for CI and host-side
# development:
#
#   camera-streamer config/test-videotestsrc.conf
#   ffplay rtsp://127.0.0.1:8554/cam0
#
# The control protocol runs too — try it by hand:
#   printf '{"id":1,"method":"get-status"}\n' | nc -q1 127.0.0.1 8555

[server]
port=8554
control-port=8555

[cam0]
enabled=true
source=test
width=1440
height=1080
framerate=30
codec=h264
bitrate=4000000

[cam1]
enabled=false
