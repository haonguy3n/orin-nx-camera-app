# camera-streamer configuration
#
# INI syntax (GLib GKeyFile). All keys are optional; the values shown are the
# built-in defaults used when a key (or this whole file) is missing.

[server]
# RTSP listen port (server binds 0.0.0.0). Streams are served at
# rtsp://<device-ip>:<port>/cam0 and /cam1.
port=8554

[cam0]
# Serve this camera at /cam0.
enabled=true

# Capture path:
#   argus - nvarguscamerasrc through the Tegra ISP (debayer/3A). Default,
#           required for color sensors.
#   v4l2  - v4l2src straight from VI (mono sensors, trigger-synchronized
#           capture). Best-effort in milestone 1.
#   test  - videotestsrc with software encoding (x264enc/x265enc); runs on
#           any host without camera hardware. For development and CI.
source=argus

# argus only: nvarguscamerasrc sensor-id.
sensor-id=0

# v4l2 only: capture device node.
#device=/dev/video0

# Capture format. IMX296 native mode is 1440x1080 at up to 60 fps
# (framerate is an integer, frames per second).
width=1440
height=1080
framerate=60

# Video codec: h265 (default) or h264.
codec=h265

# Encoder target bitrate in bit/s. 8000000 = 8 Mbit/s.
# Two 8 Mbit/s streams fit comfortably in the ~350 Mbit/s USB2 link.
bitrate=8000000

[cam1]
enabled=true
source=argus
sensor-id=1
#device=/dev/video1
width=1440
height=1080
framerate=60
codec=h265
bitrate=8000000
