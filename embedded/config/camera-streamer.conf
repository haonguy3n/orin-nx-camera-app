# camera-streamer configuration
#
# INI syntax (GLib GKeyFile). All keys are optional; the values shown are the
# built-in defaults used when a key (or this whole file) is missing.

[server]
# RTSP listen port. Streams are served at rtsp://<device-ip>:<port>/cam0
# and /cam1.
port=8554

# Which network to serve on:
#   all      - USB and ethernet at once (binds 0.0.0.0). Default.
#   usb      - USB gadget network only (usb0, i.e. rtsp://192.168.55.1)
#   ethernet - wired network only (eth0)
#   <other>  - an explicit IPv4 address or interface name
# Switch at runtime: edit this file, then `systemctl reload camera-streamer`
# (drops connected clients and rebinds).
listen=all

# Which transport carries video, control and update. ONE at a time: Argus
# permits a single consumer per camera, so serving RTSP and secure USB
# simultaneously meant the USB side pulling frames back off the local RTSP
# mount through loopback -- which also silently disabled face detection. The
# old "both" value is rejected and treated as "usb".
#   network  - TCP/RTSP only; the secure USB endpoint is not published
#   usb      - secure USB only. The cameras are served straight from the
#              encoder over USB (no RTSP, no loopback round trip) and the
#              TCP servers bind 127.0.0.1 so nothing is on the network.
# Note this is not the same as `listen` above, whose "usb" value means the
# CDC-NCM gadget *network*.
transports=usb

# Recovery update channel. With transports=usb the update server also binds
# the CDC-NCM gadget address (192.168.55.1) instead of loopback, so firmware
# can still be pushed when the secure USB transport itself is broken. That
# rides the same physical cable, so it exposes nothing beyond the plugged-in
# host. Turn off only if the update path is provided some other way -- a
# device with neither is unrecoverable in the field.
recovery-update=true

# RTP transport(s) offered to RTSP clients:
#   tcp - interleaved in the RTSP connection (default). Recommended: hosts
#         with stateful firewalls silently drop the server's UDP packets,
#         and on the point-to-point USB link TCP costs nothing.
#   udp - RTP/UDP (+multicast) only
#   all - client's choice (most clients then prefer UDP)
transport=tcp

# TCP control protocol (see proto/PROTOCOL.md in the source repo): status,
# exposure/gain/trigger, reload. Bound to the same address as the RTSP
# server. 0 disables it.
control-port=8555

# UDP discovery responder, so the host UI can find the device instead of
# assuming 192.168.55.1. Always binds 0.0.0.0. 0 disables it.
discovery-port=8556

# TLS for the control and update servers (the channels that command the
# device over the USB link). Off by default; RTSP and discovery are not
# affected. A self-signed device certificate is generated on first boot
# (camera-streamer-gencert.service) at the paths below.
#   tls-cert + tls-key  - enable TLS; the host pins the device cert
#   tls-ca              - additionally REQUIRE a client certificate
#                         signed by this CA (mTLS): only authorized host
#                         software can control the camera
# Setting only one of cert/key, or an unreadable file, is a fatal startup
# error -- there is deliberately no silent fallback to plaintext.
#tls-cert=/etc/camera-streamer/tls/server.crt
#tls-key=/etc/camera-streamer/tls/server.key
#tls-ca=/etc/camera-streamer/tls/clients-ca.crt

# OTA firmware update upload server (binary .swu upload, same address as
# RTSP). The host UI sends .swu files here; the device installs them via
# swupdate IPC. 0 disables it.
update-port=8557

[cam0]
# Serve this camera at /cam0.
enabled=true

# Capture path:
#   argus - nvarguscamerasrc through the Tegra ISP (debayer/3A). Default,
#           required for color sensors.
#   v4l2  - v4l2src straight from VI (mono sensors, trigger-synchronized
#           capture). Best-effort in milestone 1.
#   test  - videotestsrc with software encoding (x264enc/x265enc); runs on
#           any host without camera hardware. For development and CI.
source=argus

# argus only: nvarguscamerasrc sensor-id.
sensor-id=0

# v4l2 only: capture device node.
#device=/dev/video0

# Capture format. IMX296 native mode is 1440x1080 at up to 60 fps
# (framerate is an integer, frames per second).
width=1440
height=1080
framerate=60

# Video codec: h265 (default) or h264.
codec=h265

# Encoder target bitrate in bit/s. 8000000 = 8 Mbit/s.
# Two 8 Mbit/s streams fit comfortably in the ~350 Mbit/s USB2 link.
bitrate=8000000

# Sensor settings, all also settable live over the control protocol.
# exposure: µs, 0 = auto (argus) / driver default (v4l2).
# gain: 0 = auto/default; argus: analog gain multiplier (1-16),
#       v4l2: raw VC driver units (milli-dB: 0-48000 = 0-48 dB, step 100).
# trigger: VC hardware trigger mode, v4l2 source only. -1 = leave driver
#          default; 0 disabled, 1 external, 2 pulse width, 3 self,
#          4 single, 5 sync, 6 stream edge, 7 stream level.
exposure=0
gain=0
trigger=-1

# ISP overrides (argus only): any isp-<property> key sets that
# nvarguscamerasrc property; same names/ranges as the control protocol's
# set-isp (see proto/PROTOCOL.md).
# High-quality temporal noise reduction on by default: visibly cleaner
# shadows at indoor gain levels, no measurable detail loss (A/B'd on
# target 2026-07-12); auto WB beat the fixed presets on the same scene.
isp-tnr-mode=2
isp-tnr-strength=0.5
# 50 Hz mains (Vietnam/EU): pins exposure to multiples of 10 ms so frames
# don't catch different phases of the 100 Hz light pulsing. Measured on
# target: brightness peak-to-peak 40.4 -> 0.6 (AE stops hunting). Use 3 for
# 60 Hz mains (US/JP), 1 for auto-detect, 0 to disable.
isp-aeantibanding=2
#isp-wbmode=1
#isp-saturation=1.2

# cam1 is a MONO IMX296. It also runs through argus: the DT declares both
# sensors as bayer/rggb (VC's default), so the ISP debayers the mono data
# into a gray-looking image with minor artifacts — fine for streaming.
# The pure v4l2 path (needed for hardware-trigger sync capture) requires
# a DT mode change to gray/Y10 first — see DESIGN.md M3 notes.
[cam1]
enabled=true
source=argus
sensor-id=1
isp-tnr-mode=2
isp-tnr-strength=0.5
isp-aeantibanding=2
width=1440
height=1080
framerate=60
codec=h265
bitrate=8000000
exposure=0
gain=0
trigger=-1

[detect]
# On-device face detection (OpenCV YuNet on the Orin GPU via the DNN CUDA
# backend). Runs automatically whenever the model file below exists -- ship it
# with CAMERA_FACE_MODEL="1" (see the recipe). No enable flag: the model's
# presence is the switch. Each secure-USB camera pipeline then grows a raw
# branch and a detection thread that emits boxes over the metadata channel;
# the host viewer draws the overlay.
# Path to the YuNet ONNX model.
model=/usr/share/camera-streamer/face_detection_yunet.onnx
# Detector working width. Frames are scaled to this before inference; the
# height follows the camera's aspect ratio automatically and is deliberately
# not configurable -- forcing a square (e.g. 320x320 from a 4:3 sensor)
# squashes faces by a third and YuNet then misses them.
width=320
# Minimum detection confidence (0..1). Reference figures (same frame + model
# replayed on a dev host, not the device's CUDA runtime): with the corrected
# ISP real faces scored 0.52-0.72; before the ISP fix the same scene scored
# 0.32. The old built-in 0.6 rejected everything pre-fix. Raise it if you see
# false positives, lower it if faces are missed.
score=0.45
# Detections per second, well below the capture rate on purpose: boxes are only
# useful at UI refresh rates, and every detection costs a VIC scale+download and
# a GPU inference. Unthrottled this held VIC ~70% and GR3D ~40% on target -- heat
# for frames nobody looked at. 0 disables the limit.
fps=10
