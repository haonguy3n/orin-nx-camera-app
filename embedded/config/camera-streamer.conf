# camera-streamer configuration
#
# INI syntax (GLib GKeyFile). Every key is optional; the values shown are the
# built-in defaults used when a key -- or this whole file -- is missing.
#
# READ THIS FIRST: `transports` (below) decides which of the [server] keys mean
# anything. Keys are tagged [network] / [usb] / [both] accordingly. A key
# tagged [network] is simply ignored under transports=usb, and vice versa.

[server]

# --- Which transport carries video, control and update ----------------------
#
#   usb      - secure USB only. Cameras are read straight off the encoder and
#              pushed over the USB endpoints; control is handled in-process and
#              firmware upload rides an internal socketpair. The process binds
#              NO socket at all in this mode, except the recovery channel
#              below. Face detection, snapshots and box metadata are available.
#   network  - RTSP/TCP only. The secure USB endpoint is not published.
#
# ONE at a time. Argus permits a single consumer per camera, so the old "both"
# value served RTSP and secure USB from two separate pipelines and propped the
# USB side up by re-serving the camera's own RTSP mount over loopback. That
# cost an RTP round trip and silently disabled face detection (the re-serve
# string has no detect branch). "both" is now rejected and treated as "usb".
#
# Not the same as `listen` below, whose "usb" value means the CDC-NCM gadget
# *network*, not this transport.
transports=usb

# --- Recovery ---------------------------------------------------------------

# [usb] Firmware-upload listener on the CDC-NCM gadget address
# (192.168.55.1:<update-port>). This is the ONLY socket bound under
# transports=usb, and it is deliberate: it is how firmware gets pushed when the
# secure USB transport itself is broken. It rides the same physical cable, so
# it exposes nothing beyond the already-plugged-in host.
#
# Turn this off only if firmware can be delivered some other way. A device with
# neither a working USB transport nor this channel is unrecoverable in the
# field, short of a serial console.
recovery-update=true

# --- Network-mode listeners -------------------------------------------------
# All ignored under transports=usb, which binds none of them.

# [network] RTSP port. Streams are served at rtsp://<device-ip>:<port>/cam0
# and /cam1.
port=8554

# [network] Which network to serve on:
#   all      - USB-gadget network and ethernet at once (binds 0.0.0.0)
#   usb      - USB gadget network only (usb0, i.e. rtsp://192.168.55.1)
#   ethernet - wired network only (eth0)
#   <other>  - an explicit IPv4 address or interface name
# Change at runtime: edit this file, then `systemctl reload camera-streamer`
# (drops connected clients and rebinds).
listen=all

# [network] RTP transport(s) offered to RTSP clients:
#   tcp - interleaved in the RTSP connection (default). Recommended: hosts with
#         stateful firewalls silently drop the server's UDP packets, and on a
#         point-to-point link TCP costs nothing.
#   udp - RTP/UDP (+multicast) only
#   all - client's choice (most clients then prefer UDP)
transport=tcp

# [network] Control protocol listener (see proto/PROTOCOL.md): status,
# exposure/gain/zoom/isp, reload. 0 disables it.
# Under transports=usb no listener is created -- control requests arrive on the
# USB endpoint and are dispatched in-process -- so this port is unused there.
control-port=8555

# [network] UDP discovery responder, so a host can find the device instead of
# assuming an address. 0 disables it. Not started under transports=usb: a host
# attached over USB already knows where the device is.
discovery-port=8556

# [both] Firmware upload port. Under transports=network this is a normal
# listener on the address above. Under transports=usb it is used only by the
# recovery channel, since uploads arriving over USB are passed internally.
# 0 disables it.
update-port=8557

# [network] TLS for the control and update listeners. Off by default; RTSP and
# discovery are unaffected. A self-signed device certificate is generated on
# first boot (camera-streamer-gencert.service) at the paths below.
#   tls-cert + tls-key  - enable TLS; the host pins the device certificate
#   tls-ca              - additionally REQUIRE a client certificate signed by
#                         this CA (mTLS), so only authorised host software can
#                         command the camera
# Setting only one of cert/key, or an unreadable file, is a fatal startup error
# -- there is deliberately no silent fallback to plaintext.
# Irrelevant under transports=usb, where the USB session is already
# authenticated and encrypted end to end.
#tls-cert=/etc/camera-streamer/tls/server.crt
#tls-key=/etc/camera-streamer/tls/server.key
#tls-ca=/etc/camera-streamer/tls/clients-ca.crt

[cam0]
# Serve this camera (at /cam0 in network mode).
enabled=true

# Capture path:
#   argus - nvarguscamerasrc through the Tegra ISP (debayer/3A). Default, and
#           required for colour sensors.
#   v4l2  - v4l2src straight from VI (mono sensors, trigger-synchronised
#           capture). Best-effort.
#   test  - videotestsrc with software encoding; runs on any host without
#           camera hardware, for development and CI.
source=argus

# argus only: nvarguscamerasrc sensor-id.
sensor-id=0

# v4l2 only: capture device node.
#device=/dev/video0

# Capture format. IMX296 native mode is 1440x1080 at up to 60 fps
# (framerate is an integer, frames per second).
width=1440
height=1080
framerate=60

# Video codec: h265 (default) or h264.
codec=h265

# Encoder target bitrate in bit/s. 8000000 = 8 Mbit/s.
# Two 8 Mbit/s streams fit comfortably in the ~350 Mbit/s USB2 link.
bitrate=8000000

# Sensor settings, all also settable live over the control protocol.
# exposure: microseconds, 0 = auto (argus) / driver default (v4l2).
# gain: 0 = auto/default; argus: analog gain multiplier (1-16),
#       v4l2: raw VC driver units (milli-dB: 0-48000 = 0-48 dB, step 100).
# trigger: VC hardware trigger mode, v4l2 source only. -1 = leave the driver
#          default; 0 disabled, 1 external, 2 pulse width, 3 self, 4 single,
#          5 sync, 6 stream edge, 7 stream level.
exposure=0
gain=0
trigger=-1

# ISP overrides (argus only): any isp-<property> key sets that nvarguscamerasrc
# property, using the same names and ranges as the set-isp control method.
# These ride the launch string, so they apply whenever the pipeline is built.
#
# NOTE: this is NOT where black level, colour matrix or lens shading live --
# those are in camera_overrides.isp (see the vc-isp-tuning recipe) and are read
# only when Argus opens the sensor, so changing them needs a restart.
#
# High-quality temporal noise reduction is on by default: visibly cleaner
# shadows at indoor gain levels, no measurable detail loss (A/B'd on target
# 2026-07-12); auto WB beat the fixed presets on the same scene.
isp-tnr-mode=2
isp-tnr-strength=0.5
# 50 Hz mains (Vietnam/EU): pins exposure to multiples of 10 ms so frames don't
# catch different phases of the 100 Hz light pulsing. Measured on target:
# brightness peak-to-peak 40.4 -> 0.6 (AE stops hunting). Use 3 for 60 Hz mains
# (US/JP), 1 for auto-detect, 0 to disable.
isp-aeantibanding=2
# White-balance preset: 1 auto, 2 incandescent, 3 fluorescent,
# 4 warm-fluorescent, 5 daylight, 6 cloudy, 7 twilight, 8 shade, 9 manual.
#isp-wbmode=5
#isp-saturation=1.2

[cam1]
# NOTE: on the current board only ONE sensor enumerates. Argus reports
# "Invalid camera device specified 1 specified, 0 max index" and only
# /dev/video0 exists, so cam1 fails to open however it is configured. That is a
# wiring or device-tree issue, not an application one -- set enabled=false to
# stop the retry noise in the journal until it is resolved.
#
# cam1 is a MONO IMX296 but also runs through argus: the DT declares both
# sensors as bayer/rggb (VC's default), so the ISP debayers the mono data into
# a grey-looking image with minor artifacts -- fine for streaming. The pure
# v4l2 path (needed for hardware-trigger sync capture) requires a DT mode
# change to gray/Y10 first -- see DESIGN.md M3 notes.
enabled=true
source=argus
sensor-id=1
width=1440
height=1080
framerate=60
codec=h265
bitrate=8000000
exposure=0
gain=0
trigger=-1
isp-tnr-mode=2
isp-tnr-strength=0.5
isp-aeantibanding=2

[detect]
# On-device face detection: OpenCV YuNet on the Orin GPU via the DNN CUDA
# backend. There is no enable flag -- the model file's presence is the switch,
# so ship it (CAMERA_FACE_MODEL="1", see the recipe) to turn detection on and
# point `model` at a nonexistent path to turn it off.
#
# The camera pipeline grows a raw branch and a detection thread; boxes go to
# the host over the metadata channel and the viewer draws them. Currently this
# runs on the secure-USB path only, and only while a host session is active --
# no session means no detection and no snapshots.

# Path to the YuNet ONNX model.
model=/usr/share/camera-streamer/face_detection_yunet.onnx

# Detector working width. Frames are scaled to this before inference; the
# height follows the camera's aspect ratio automatically and is deliberately
# NOT configurable -- forcing a square (e.g. 320x320 from a 4:3 sensor)
# squashes every face by a third and YuNet then misses them.
width=320

# Minimum detection confidence, 0..1. Reference figures, measured by replaying
# the same frame and model on a dev host (not the device's CUDA runtime, so
# treat as indicative): with the corrected ISP real faces scored 0.52-0.72;
# before the ISP fix the same scene scored 0.32, which is why the old built-in
# 0.6 rejected everything. Raise it if you see false positives, lower it if
# faces are missed.
score=0.45

# Detections per second, deliberately far below the capture rate: boxes are
# only useful at UI refresh rates, and each detection costs a scale+download
# plus a GPU inference. Measured on target, pacing this to 10 took GR3D from
# 36-41% to 25-28%. 0 disables the limit.
#
# Note VIC load (~70%) is NOT this branch -- it reads the same with detection
# disabled entirely, because it is the camera/encode path. Lowering this will
# not reduce it.
fps=10
